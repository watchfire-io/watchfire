syntax = "proto3";

package watchfire;

option go_package = "github.com/watchfire-io/watchfire/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================================
// Common Messages
// ============================================================================

// RequestMeta is included in every request for tracking and analytics
message RequestMeta {
  string origin = 1;     // "cli" | "tui" | "gui" | "api"
  string client_id = 2;  // Unique client instance ID
  string version = 3;    // Client version
}

// ============================================================================
// Project Messages
// ============================================================================

message Project {
  string project_id = 1;
  string name = 2;
  string path = 3;
  string status = 4;                            // "active" | "archived"
  string color = 5;                             // Hex color for GUI
  reserved 6;                                    // was default_branch
  string default_agent = 7;
  string sandbox = 8;
  bool auto_merge = 9;
  bool auto_delete_branch = 10;
  bool auto_start_tasks = 11;
  string definition = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  int32 next_task_number = 15;
  int32 position = 16;                          // Display ordering in GUI
  string secrets_instructions = 17;             // Content of secrets/instructions.md
  ProjectNotifications notifications = 18;      // Per-project notification overrides
}

message ProjectNotifications {
  bool muted = 1;                               // If true, suppress all notifications for this project
}

message ProjectId {
  RequestMeta meta = 1;
  string project_id = 2;
}

message ProjectList {
  repeated Project projects = 1;
}

message CreateProjectRequest {
  RequestMeta meta = 1;
  string path = 2;                              // Directory path
  string name = 3;                              // Project name (defaults to folder name)
  string definition = 4;                        // Optional project definition
  reserved 5;                                   // was default_branch
  bool auto_merge = 6;
  bool auto_delete_branch = 7;
  bool auto_start_tasks = 8;
}

message UpdateProjectRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  optional string name = 3;
  optional string color = 4;
  reserved 5;                                   // was default_branch
  optional string default_agent = 6;
  optional bool auto_merge = 7;
  optional bool auto_delete_branch = 8;
  optional bool auto_start_tasks = 9;
  optional string definition = 10;
  optional string secrets_instructions = 11;
  optional bool notifications_muted = 12;       // Per-project notification mute
}

message ReorderProjectsRequest {
  RequestMeta meta = 1;
  repeated string project_ids = 2;            // Project IDs in new order
}

message GitInfo {
  string current_branch = 1;
  string remote_url = 2;
  bool is_dirty = 3;
  int32 uncommitted_count = 4;
  int32 ahead = 5;
  int32 behind = 6;
}

// ============================================================================
// Task Messages
// ============================================================================

message Task {
  string task_id = 1;                           // 8-char alphanumeric
  int32 task_number = 2;                        // Sequential, user-facing
  string project_id = 3;
  string title = 4;
  string prompt = 5;
  string acceptance_criteria = 6;
  string status = 7;                            // "draft" | "ready" | "done"
  optional bool success = 8;                    // Only when status=done
  optional string failure_reason = 9;           // Only when success=false
  int32 position = 10;                          // Display/work ordering
  int32 agent_sessions = 11;
  google.protobuf.Timestamp created_at = 12;
  optional google.protobuf.Timestamp started_at = 13;
  optional google.protobuf.Timestamp completed_at = 14;
  google.protobuf.Timestamp updated_at = 15;
  optional google.protobuf.Timestamp deleted_at = 16;  // Soft delete
  string agent = 17;                            // Backend name override; empty = use project default
}

message TaskId {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 task_number = 3;
}

message TaskList {
  repeated Task tasks = 1;
}

message ListTasksRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  optional string status = 3;                   // Filter by status
  bool include_deleted = 4;                     // Include soft-deleted tasks
}

message CreateTaskRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string title = 3;
  string prompt = 4;
  optional string acceptance_criteria = 5;
  string status = 6;                            // "draft" | "ready"
  optional int32 position = 7;                  // Position in list
  optional string agent = 8;                    // Backend name override; empty = use project default
}

message UpdateTaskRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 task_number = 3;
  optional string title = 4;
  optional string prompt = 5;
  optional string acceptance_criteria = 6;
  optional string status = 7;
  optional bool success = 8;
  optional string failure_reason = 9;
  optional int32 position = 10;
  optional string agent = 11;                   // Backend name override; empty = use project default
}

message BulkUpdateStatusRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated int32 task_numbers = 3;
  string new_status = 4;                        // "draft" | "ready" | "done"
}

message BulkDeleteRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated int32 task_numbers = 3;
}

message BulkRestoreRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated int32 task_numbers = 3;
}

message ReorderTasksRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated int32 task_numbers = 3;              // Task numbers in new order
}

// ============================================================================
// Daemon Messages
// ============================================================================

message DaemonStatus {
  string host = 1;
  int32 port = 2;
  int32 pid = 3;
  google.protobuf.Timestamp started_at = 4;
  int32 active_agents = 5;
  repeated string active_projects = 6;          // Project IDs with running agents
  bool update_available = 7;
  string update_version = 8;
  string update_url = 9;
}

// ============================================================================
// Agent Messages
// ============================================================================

message AgentStatus {
  string project_id = 1;
  string project_name = 2;
  string mode = 3;                              // "chat" | "task" | "start-all" | "wildfire"
  int32 task_number = 4;
  string task_title = 5;
  bool is_running = 6;
  string wildfire_phase = 7;                    // "execute" | "refine" | "generate" | "" (wildfire only)
  optional AgentIssue issue = 8;                // Current blocking issue, if any
  optional google.protobuf.Timestamp started_at = 9; // When the current session started
}

message StartAgentRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string mode = 3;                              // "chat" | "task" | "start-all" | "wildfire"
  int32 task_number = 4;                        // Required for task/start-all modes
  int32 rows = 5;                               // Initial PTY rows (0 = use default)
  int32 cols = 6;                               // Initial PTY cols (0 = use default)
  string sandbox = 7;                           // Sandbox backend override: "auto" | "seatbelt" | "landlock" | "bwrap" | "none"
}

message ScreenBuffer {
  string project_id = 1;
  repeated string lines = 2;
  int32 cursor_row = 3;
  int32 cursor_col = 4;
  int32 rows = 5;
  int32 cols = 6;
  string ansi_content = 7;  // full screen as ANSI SGR text
}

message SubscribeScreenRequest {
  RequestMeta meta = 1;
  string project_id = 2;
}

message ScrollbackRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message ScrollbackLines {
  repeated string lines = 1;
  int32 total_lines = 2;
}

message SendInputRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  bytes data = 3;
}

message ResizeRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 rows = 3;
  int32 cols = 4;
}

message SubscribeRawOutputRequest {
  RequestMeta meta = 1;
  string project_id = 2;
}

message RawOutputChunk {
  string project_id = 1;
  bytes data = 2;
}

message AgentIssue {
  string issue_type = 1;                              // "auth_required" | "rate_limited" | ""
  google.protobuf.Timestamp detected_at = 2;
  string message = 3;
  optional google.protobuf.Timestamp reset_at = 4;    // When limit resets (rate limits)
  optional google.protobuf.Timestamp cooldown_until = 5; // When to auto-resume
}

message SubscribeAgentIssuesRequest {
  RequestMeta meta = 1;
  string project_id = 2;
}

// ============================================================================
// Branch Messages
// ============================================================================

message Branch {
  string name = 1;                                // e.g. "watchfire/0001"
  string project_id = 2;
  int32 task_number = 3;                          // 0 if not associated with a task
  string status = 4;                              // "merged" | "unmerged" | "orphaned"
  string worktree_path = 5;                       // Empty if worktree removed
}

message BranchList {
  repeated Branch branches = 1;
}

message BranchId {
  RequestMeta meta = 1;
  string project_id = 2;
  string branch_name = 3;
}

message MergeBranchRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string branch_name = 3;
  bool delete_after_merge = 4;
}

message BulkBranchRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated string branch_names = 3;
}

// ============================================================================
// Settings Messages
// ============================================================================

message AgentConfig {
  string path = 1;                                // Empty = lookup in PATH
}

message DefaultsConfig {
  bool auto_merge = 1;
  bool auto_delete_branch = 2;
  bool auto_start_tasks = 3;
  reserved 4;                                     // was default_branch
  string default_sandbox = 5;
  string default_agent = 6;
  NotificationsConfig notifications = 7;
}

message NotificationsEvents {
  bool task_failed = 1;
  bool run_complete = 2;
}

message NotificationsSounds {
  bool enabled = 1;
  bool task_failed = 2;
  bool run_complete = 3;
  double volume = 4;                              // 0.0..1.0
}

message QuietHoursConfig {
  bool enabled = 1;
  string start = 2;                               // "HH:MM" 24h local time
  string end = 3;                                 // "HH:MM" 24h local time
}

message NotificationsConfig {
  bool enabled = 1;                               // Master toggle
  NotificationsEvents events = 2;
  NotificationsSounds sounds = 3;
  QuietHoursConfig quiet_hours = 4;
}

message UpdatesConfig {
  bool check_on_startup = 1;
  string check_frequency = 2;                     // "every_launch" | "daily" | "weekly"
  bool auto_download = 3;
}

message AppearanceConfig {
  string theme = 1;                               // "system" | "light" | "dark"
}

message Settings {
  int32 version = 1;
  map<string, AgentConfig> agents = 2;
  DefaultsConfig defaults = 3;
  UpdatesConfig updates = 4;
  AppearanceConfig appearance = 5;
  string installation_id = 6;
}

message UpdateSettingsRequest {
  RequestMeta meta = 1;
  optional DefaultsConfig defaults = 2;
  optional UpdatesConfig updates = 3;
  optional AppearanceConfig appearance = 4;
  map<string, AgentConfig> agents = 5;            // Merge into existing
}

message AgentInfo {
  string name = 1;                                // Backend name (e.g. "claude-code")
  string display_name = 2;                        // Human-readable label (e.g. "Claude Code")
  bool available = 3;                             // Binary resolves on this host (display-time hint only — never used to filter the registry)
}

message AgentList {
  repeated AgentInfo agents = 1;
}

// ============================================================================
// Services
// ============================================================================

// ProjectService handles project CRUD operations
service ProjectService {
  rpc ListProjects(google.protobuf.Empty) returns (ProjectList);
  rpc GetProject(ProjectId) returns (Project);
  rpc CreateProject(CreateProjectRequest) returns (Project);
  rpc UpdateProject(UpdateProjectRequest) returns (Project);
  rpc DeleteProject(ProjectId) returns (google.protobuf.Empty);
  rpc GetGitInfo(ProjectId) returns (GitInfo);
  rpc ReorderProjects(ReorderProjectsRequest) returns (ProjectList);
}

// TaskService handles task CRUD and bulk operations
service TaskService {
  rpc ListTasks(ListTasksRequest) returns (TaskList);
  rpc GetTask(TaskId) returns (Task);
  rpc CreateTask(CreateTaskRequest) returns (Task);
  rpc UpdateTask(UpdateTaskRequest) returns (Task);
  rpc DeleteTask(TaskId) returns (Task);
  rpc RestoreTask(TaskId) returns (Task);
  rpc EmptyTrash(ProjectId) returns (google.protobuf.Empty);
  rpc BulkUpdateStatus(BulkUpdateStatusRequest) returns (TaskList);
  rpc BulkDelete(BulkDeleteRequest) returns (TaskList);
  rpc BulkRestore(BulkRestoreRequest) returns (TaskList);
  rpc ReorderTasks(ReorderTasksRequest) returns (TaskList);
}

// DaemonService handles daemon status and lifecycle
service DaemonService {
  rpc GetStatus(google.protobuf.Empty) returns (DaemonStatus);
  rpc Shutdown(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc SubscribeFocusEvents(SubscribeFocusEventsRequest) returns (stream FocusEvent);
}

// FocusTarget identifies which view in the GUI a focus event is targeting.
enum FocusTarget {
  FOCUS_TARGET_MAIN = 0;   // Project's main / dashboard view
  FOCUS_TARGET_TASKS = 1;  // Project's TasksTab
  FOCUS_TARGET_TASK = 2;   // Specific task within a project
}

message SubscribeFocusEventsRequest {
  RequestMeta meta = 1;
}

message FocusEvent {
  string project_id = 1;
  FocusTarget target = 2;
  int32 task_number = 3;  // Only meaningful when target == FOCUS_TARGET_TASK
}

// LogService handles session log retrieval
service LogService {
  rpc ListLogs(ListLogsRequest) returns (LogList);
  rpc GetLog(GetLogRequest) returns (LogContent);
  rpc DeleteLog(DeleteLogRequest) returns (google.protobuf.Empty);
}

// ============================================================================
// Log Messages
// ============================================================================

message ListLogsRequest {
  RequestMeta meta = 1;
  string project_id = 2;
}

message LogEntry {
  string log_id = 1;
  string project_id = 2;
  int32 task_number = 3;
  int32 session_number = 4;
  string agent = 5;
  string mode = 6;
  string started_at = 7;
  string ended_at = 8;
  string status = 9;
}

message LogList {
  repeated LogEntry logs = 1;
}

message GetLogRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string log_id = 3;
}

message LogContent {
  LogEntry entry = 1;
  string content = 2;
}

message DeleteLogRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string log_id = 3;
}

// AgentService handles agent lifecycle and terminal interaction
service AgentService {
  rpc StartAgent(StartAgentRequest) returns (AgentStatus);
  rpc StopAgent(ProjectId) returns (google.protobuf.Empty);
  rpc GetAgentStatus(ProjectId) returns (AgentStatus);
  rpc SubscribeScreen(SubscribeScreenRequest) returns (stream ScreenBuffer);
  rpc GetScrollback(ScrollbackRequest) returns (ScrollbackLines);
  rpc SendInput(SendInputRequest) returns (google.protobuf.Empty);
  rpc Resize(ResizeRequest) returns (google.protobuf.Empty);
  rpc SubscribeRawOutput(SubscribeRawOutputRequest) returns (stream RawOutputChunk);
  rpc SubscribeAgentIssues(SubscribeAgentIssuesRequest) returns (stream AgentIssue);
  rpc ResumeAgent(ProjectId) returns (AgentStatus);  // Clear rate limit cooldown
}

// BranchService handles git worktree branch operations
service BranchService {
  rpc ListBranches(ProjectId) returns (BranchList);
  rpc GetBranch(BranchId) returns (Branch);
  rpc MergeBranch(MergeBranchRequest) returns (Branch);
  rpc DeleteBranch(BranchId) returns (google.protobuf.Empty);
  rpc PruneBranches(ProjectId) returns (BranchList);          // Remove orphaned branches
  rpc BulkMerge(BulkBranchRequest) returns (BranchList);
  rpc BulkDelete(BulkBranchRequest) returns (google.protobuf.Empty);
}

// SettingsService handles global application settings
service SettingsService {
  rpc GetSettings(google.protobuf.Empty) returns (Settings);
  rpc UpdateSettings(UpdateSettingsRequest) returns (Settings);
  rpc ListAgents(google.protobuf.Empty) returns (AgentList);
}

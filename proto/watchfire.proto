syntax = "proto3";

package watchfire;

option go_package = "github.com/watchfire-io/watchfire/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================================
// Common Messages
// ============================================================================

// RequestMeta is included in every request for tracking and analytics
message RequestMeta {
  string origin = 1;     // "cli" | "tui" | "gui" | "api"
  string client_id = 2;  // Unique client instance ID
  string version = 3;    // Client version
}

// ============================================================================
// Project Messages
// ============================================================================

message Project {
  string project_id = 1;
  string name = 2;
  string path = 3;
  string status = 4;                            // "active" | "archived"
  string color = 5;                             // Hex color for GUI
  reserved 6;                                    // was default_branch
  string default_agent = 7;
  string sandbox = 8;
  bool auto_merge = 9;
  bool auto_delete_branch = 10;
  bool auto_start_tasks = 11;
  string definition = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  int32 next_task_number = 15;
  int32 position = 16;                          // Display ordering in GUI
  string secrets_instructions = 17;             // Content of secrets/instructions.md
  ProjectNotifications notifications = 18;      // Per-project notification overrides
}

message ProjectNotifications {
  bool muted = 1;                               // If true, suppress all notifications for this project
}

message ProjectId {
  RequestMeta meta = 1;
  string project_id = 2;
}

message ProjectList {
  repeated Project projects = 1;
}

message CreateProjectRequest {
  RequestMeta meta = 1;
  string path = 2;                              // Directory path
  string name = 3;                              // Project name (defaults to folder name)
  string definition = 4;                        // Optional project definition
  reserved 5;                                   // was default_branch
  bool auto_merge = 6;
  bool auto_delete_branch = 7;
  bool auto_start_tasks = 8;
}

message UpdateProjectRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  optional string name = 3;
  optional string color = 4;
  reserved 5;                                   // was default_branch
  optional string default_agent = 6;
  optional bool auto_merge = 7;
  optional bool auto_delete_branch = 8;
  optional bool auto_start_tasks = 9;
  optional string definition = 10;
  optional string secrets_instructions = 11;
  optional bool notifications_muted = 12;       // Per-project notification mute
}

message ReorderProjectsRequest {
  RequestMeta meta = 1;
  repeated string project_ids = 2;            // Project IDs in new order
}

message GitInfo {
  string current_branch = 1;
  string remote_url = 2;
  bool is_dirty = 3;
  int32 uncommitted_count = 4;
  int32 ahead = 5;
  int32 behind = 6;
}

// ============================================================================
// Task Messages
// ============================================================================

message Task {
  string task_id = 1;                           // 8-char alphanumeric
  int32 task_number = 2;                        // Sequential, user-facing
  string project_id = 3;
  string title = 4;
  string prompt = 5;
  string acceptance_criteria = 6;
  string status = 7;                            // "draft" | "ready" | "done"
  optional bool success = 8;                    // Only when status=done
  optional string failure_reason = 9;           // Only when success=false
  int32 position = 10;                          // Display/work ordering
  int32 agent_sessions = 11;
  google.protobuf.Timestamp created_at = 12;
  optional google.protobuf.Timestamp started_at = 13;
  optional google.protobuf.Timestamp completed_at = 14;
  google.protobuf.Timestamp updated_at = 15;
  optional google.protobuf.Timestamp deleted_at = 16;  // Soft delete
  string agent = 17;                            // Backend name override; empty = use project default
}

message TaskId {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 task_number = 3;
}

message TaskList {
  repeated Task tasks = 1;
}

message ListTasksRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  optional string status = 3;                   // Filter by status
  bool include_deleted = 4;                     // Include soft-deleted tasks
}

message CreateTaskRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string title = 3;
  string prompt = 4;
  optional string acceptance_criteria = 5;
  string status = 6;                            // "draft" | "ready"
  optional int32 position = 7;                  // Position in list
  optional string agent = 8;                    // Backend name override; empty = use project default
}

message UpdateTaskRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 task_number = 3;
  optional string title = 4;
  optional string prompt = 5;
  optional string acceptance_criteria = 6;
  optional string status = 7;
  optional bool success = 8;
  optional string failure_reason = 9;
  optional int32 position = 10;
  optional string agent = 11;                   // Backend name override; empty = use project default
}

message BulkUpdateStatusRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated int32 task_numbers = 3;
  string new_status = 4;                        // "draft" | "ready" | "done"
}

message BulkDeleteRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated int32 task_numbers = 3;
}

message BulkRestoreRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated int32 task_numbers = 3;
}

message ReorderTasksRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated int32 task_numbers = 3;              // Task numbers in new order
}

// ============================================================================
// Daemon Messages
// ============================================================================

message DaemonStatus {
  string host = 1;
  int32 port = 2;
  int32 pid = 3;
  google.protobuf.Timestamp started_at = 4;
  int32 active_agents = 5;
  repeated string active_projects = 6;          // Project IDs with running agents
  bool update_available = 7;
  string update_version = 8;
  string update_url = 9;
}

// ============================================================================
// Agent Messages
// ============================================================================

message AgentStatus {
  string project_id = 1;
  string project_name = 2;
  string mode = 3;                              // "chat" | "task" | "start-all" | "wildfire"
  int32 task_number = 4;
  string task_title = 5;
  bool is_running = 6;
  string wildfire_phase = 7;                    // "execute" | "refine" | "generate" | "" (wildfire only)
  optional AgentIssue issue = 8;                // Current blocking issue, if any
  optional google.protobuf.Timestamp started_at = 9; // When the current session started
}

message StartAgentRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string mode = 3;                              // "chat" | "task" | "start-all" | "wildfire"
  int32 task_number = 4;                        // Required for task/start-all modes
  int32 rows = 5;                               // Initial PTY rows (0 = use default)
  int32 cols = 6;                               // Initial PTY cols (0 = use default)
  string sandbox = 7;                           // Sandbox backend override: "auto" | "seatbelt" | "landlock" | "bwrap" | "none"
}

message ScreenBuffer {
  string project_id = 1;
  repeated string lines = 2;
  int32 cursor_row = 3;
  int32 cursor_col = 4;
  int32 rows = 5;
  int32 cols = 6;
  string ansi_content = 7;  // full screen as ANSI SGR text
}

message SubscribeScreenRequest {
  RequestMeta meta = 1;
  string project_id = 2;
}

message ScrollbackRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 offset = 3;
  int32 limit = 4;
}

message ScrollbackLines {
  repeated string lines = 1;
  int32 total_lines = 2;
}

message SendInputRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  bytes data = 3;
}

message ResizeRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 rows = 3;
  int32 cols = 4;
}

message SubscribeRawOutputRequest {
  RequestMeta meta = 1;
  string project_id = 2;
}

message RawOutputChunk {
  string project_id = 1;
  bytes data = 2;
}

message AgentIssue {
  string issue_type = 1;                              // "auth_required" | "rate_limited" | ""
  google.protobuf.Timestamp detected_at = 2;
  string message = 3;
  optional google.protobuf.Timestamp reset_at = 4;    // When limit resets (rate limits)
  optional google.protobuf.Timestamp cooldown_until = 5; // When to auto-resume
}

message SubscribeAgentIssuesRequest {
  RequestMeta meta = 1;
  string project_id = 2;
}

// ============================================================================
// Branch Messages
// ============================================================================

message Branch {
  string name = 1;                                // e.g. "watchfire/0001"
  string project_id = 2;
  int32 task_number = 3;                          // 0 if not associated with a task
  string status = 4;                              // "merged" | "unmerged" | "orphaned"
  string worktree_path = 5;                       // Empty if worktree removed
}

message BranchList {
  repeated Branch branches = 1;
}

message BranchId {
  RequestMeta meta = 1;
  string project_id = 2;
  string branch_name = 3;
}

message MergeBranchRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string branch_name = 3;
  bool delete_after_merge = 4;
}

message BulkBranchRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  repeated string branch_names = 3;
}

// ============================================================================
// Settings Messages
// ============================================================================

message AgentConfig {
  string path = 1;                                // Empty = lookup in PATH
}

message DefaultsConfig {
  bool auto_merge = 1;
  bool auto_delete_branch = 2;
  bool auto_start_tasks = 3;
  reserved 4;                                     // was default_branch
  string default_sandbox = 5;
  string default_agent = 6;
  NotificationsConfig notifications = 7;
  string terminal_shell = 8;                      // Empty = login-shell autodetect; non-empty = absolute path used by GUI in-app terminal
}

message NotificationsEvents {
  bool task_failed = 1;
  bool run_complete = 2;
  bool weekly_digest = 3;                           // v6.0 Ember
}

message NotificationsSounds {
  bool enabled = 1;
  bool task_failed = 2;
  bool run_complete = 3;
  double volume = 4;                              // 0.0..1.0
}

message QuietHoursConfig {
  bool enabled = 1;
  string start = 2;                               // "HH:MM" 24h local time
  string end = 3;                                 // "HH:MM" 24h local time
}

message NotificationsConfig {
  bool enabled = 1;                               // Master toggle
  NotificationsEvents events = 2;
  NotificationsSounds sounds = 3;
  QuietHoursConfig quiet_hours = 4;
  string digest_schedule = 5;                     // v6.0 Ember — "MON 09:00" / "DAILY 17:00" etc.
}

message UpdatesConfig {
  bool check_on_startup = 1;
  string check_frequency = 2;                     // "every_launch" | "daily" | "weekly"
  bool auto_download = 3;
}

message AppearanceConfig {
  string theme = 1;                               // "system" | "light" | "dark"
}

message Settings {
  int32 version = 1;
  map<string, AgentConfig> agents = 2;
  DefaultsConfig defaults = 3;
  UpdatesConfig updates = 4;
  AppearanceConfig appearance = 5;
  string installation_id = 6;
}

message UpdateSettingsRequest {
  RequestMeta meta = 1;
  optional DefaultsConfig defaults = 2;
  optional UpdatesConfig updates = 3;
  optional AppearanceConfig appearance = 4;
  map<string, AgentConfig> agents = 5;            // Merge into existing
}

message AgentInfo {
  string name = 1;                                // Backend name (e.g. "claude-code")
  string display_name = 2;                        // Human-readable label (e.g. "Claude Code")
  bool available = 3;                             // Binary resolves on this host (display-time hint only — never used to filter the registry)
}

message AgentList {
  repeated AgentInfo agents = 1;
}

// ============================================================================
// Services
// ============================================================================

// ProjectService handles project CRUD operations
service ProjectService {
  rpc ListProjects(google.protobuf.Empty) returns (ProjectList);
  rpc GetProject(ProjectId) returns (Project);
  rpc CreateProject(CreateProjectRequest) returns (Project);
  rpc UpdateProject(UpdateProjectRequest) returns (Project);
  rpc DeleteProject(ProjectId) returns (google.protobuf.Empty);
  rpc GetGitInfo(ProjectId) returns (GitInfo);
  rpc ReorderProjects(ReorderProjectsRequest) returns (ProjectList);
}

// TaskService handles task CRUD and bulk operations
service TaskService {
  rpc ListTasks(ListTasksRequest) returns (TaskList);
  rpc GetTask(TaskId) returns (Task);
  rpc CreateTask(CreateTaskRequest) returns (Task);
  rpc UpdateTask(UpdateTaskRequest) returns (Task);
  rpc DeleteTask(TaskId) returns (Task);
  rpc RestoreTask(TaskId) returns (Task);
  rpc EmptyTrash(ProjectId) returns (google.protobuf.Empty);
  rpc BulkUpdateStatus(BulkUpdateStatusRequest) returns (TaskList);
  rpc BulkDelete(BulkDeleteRequest) returns (TaskList);
  rpc BulkRestore(BulkRestoreRequest) returns (TaskList);
  rpc ReorderTasks(ReorderTasksRequest) returns (TaskList);
}

// DaemonService handles daemon status and lifecycle
service DaemonService {
  rpc GetStatus(google.protobuf.Empty) returns (DaemonStatus);
  rpc Shutdown(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc SubscribeFocusEvents(SubscribeFocusEventsRequest) returns (stream FocusEvent);
}

// FocusTarget identifies which view in the GUI a focus event is targeting.
enum FocusTarget {
  FOCUS_TARGET_MAIN = 0;    // Project's main / dashboard view
  FOCUS_TARGET_TASKS = 1;   // Project's TasksTab
  FOCUS_TARGET_TASK = 2;    // Specific task within a project
  FOCUS_TARGET_DIGEST = 3;  // Open the weekly digest modal (v6.0 Ember)
}

message SubscribeFocusEventsRequest {
  RequestMeta meta = 1;
}

message FocusEvent {
  string project_id = 1;
  FocusTarget target = 2;
  int32 task_number = 3;     // Only meaningful when target == FOCUS_TARGET_TASK
  string digest_date = 4;    // YYYY-MM-DD identifying the digest file (FOCUS_TARGET_DIGEST)
}

// LogService handles session log retrieval
service LogService {
  rpc ListLogs(ListLogsRequest) returns (LogList);
  rpc GetLog(GetLogRequest) returns (LogContent);
  rpc DeleteLog(DeleteLogRequest) returns (google.protobuf.Empty);
}

// ============================================================================
// Log Messages
// ============================================================================

message ListLogsRequest {
  RequestMeta meta = 1;
  string project_id = 2;
}

message LogEntry {
  string log_id = 1;
  string project_id = 2;
  int32 task_number = 3;
  int32 session_number = 4;
  string agent = 5;
  string mode = 6;
  string started_at = 7;
  string ended_at = 8;
  string status = 9;
}

message LogList {
  repeated LogEntry logs = 1;
}

message GetLogRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string log_id = 3;
}

message LogContent {
  LogEntry entry = 1;
  string content = 2;
}

message DeleteLogRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  string log_id = 3;
}

// AgentService handles agent lifecycle and terminal interaction
service AgentService {
  rpc StartAgent(StartAgentRequest) returns (AgentStatus);
  rpc StopAgent(ProjectId) returns (google.protobuf.Empty);
  rpc GetAgentStatus(ProjectId) returns (AgentStatus);
  rpc SubscribeScreen(SubscribeScreenRequest) returns (stream ScreenBuffer);
  rpc GetScrollback(ScrollbackRequest) returns (ScrollbackLines);
  rpc SendInput(SendInputRequest) returns (google.protobuf.Empty);
  rpc Resize(ResizeRequest) returns (google.protobuf.Empty);
  rpc SubscribeRawOutput(SubscribeRawOutputRequest) returns (stream RawOutputChunk);
  rpc SubscribeAgentIssues(SubscribeAgentIssuesRequest) returns (stream AgentIssue);
  rpc ResumeAgent(ProjectId) returns (AgentStatus);  // Clear rate limit cooldown
}

// BranchService handles git worktree branch operations
service BranchService {
  rpc ListBranches(ProjectId) returns (BranchList);
  rpc GetBranch(BranchId) returns (Branch);
  rpc MergeBranch(MergeBranchRequest) returns (Branch);
  rpc DeleteBranch(BranchId) returns (google.protobuf.Empty);
  rpc PruneBranches(ProjectId) returns (BranchList);          // Remove orphaned branches
  rpc BulkMerge(BulkBranchRequest) returns (BranchList);
  rpc BulkDelete(BulkBranchRequest) returns (google.protobuf.Empty);
}

// SettingsService handles global application settings
service SettingsService {
  rpc GetSettings(google.protobuf.Empty) returns (Settings);
  rpc UpdateSettings(UpdateSettingsRequest) returns (Settings);
  rpc ListAgents(google.protobuf.Empty) returns (AgentList);
}

// ============================================================================
// Notification Messages
// ============================================================================

// NotificationKind enumerates the high-level reasons the daemon emits a
// notification. STUCK_AGENT is reserved for a future task; TASK_FAILED and
// RUN_COMPLETE ship in v5.0 Pulse, WEEKLY_DIGEST in v6.0 Ember.
enum NotificationKind {
  TASK_FAILED = 0;
  RUN_COMPLETE = 1;
  STUCK_AGENT = 2;
  WEEKLY_DIGEST = 3;
}

// Notification is a single user-facing event the daemon emits when something
// the user cares about happens (a task fails, an autonomous run finishes, …).
// Mirrors the JSONL record written to ~/.watchfire/logs/<project_id>/notifications.log.
message Notification {
  string id = 1;                              // Stable hash; duplicates collapse
  string project_id = 2;
  int32 task_number = 3;                      // 0 when not task-scoped
  string title = 4;
  string body = 5;
  google.protobuf.Timestamp emitted_at = 6;
  NotificationKind kind = 7;
}

message SubscribeNotificationsRequest {
  RequestMeta meta = 1;
}

// NotificationService streams desktop-notification events to subscribed
// clients (the GUI shows them as native OS notifications; the tray reads
// the JSONL fallback log written by the daemon for headless runs).
service NotificationService {
  rpc Subscribe(SubscribeNotificationsRequest) returns (stream Notification);
}

// ============================================================================
// Insights Messages (v6.0 Ember)
// ============================================================================

// ExportFormat selects the wire format for an exported report. CSV is a
// flat single-file representation (multi-section reports use a `# section:`
// header line to delimit sub-tables); MARKDOWN renders human-readable
// reports with H2 headings.
enum ExportFormat {
  CSV = 0;
  MARKDOWN = 1;
}

// ExportReportRequest names a scope (single task / project / fleet-wide
// global) and a format. window_start / window_end bound the time-range the
// report covers (applies to per-day breakdowns; ignored for single_task).
message ExportReportRequest {
  RequestMeta meta = 1;
  oneof scope {
    string project_id = 2;       // Per-project report
    bool global = 3;             // Fleet rollup
    string single_task = 4;      // "<project_id>:<task_number>" — one task
  }
  ExportFormat format = 5;
  google.protobuf.Timestamp window_start = 6;
  google.protobuf.Timestamp window_end = 7;
}

// ExportReportResponse carries the rendered file. content is the raw bytes
// (UTF-8 text for CSV / Markdown); the GUI saves it via Blob URL using the
// supplied filename. mime is `text/csv` or `text/markdown`.
message ExportReportResponse {
  string filename = 1;
  bytes content = 2;
  string mime = 3;
}

// GetGlobalInsightsRequest bounds a fleet-wide rollup query. Both bounds
// are optional — an unset window_start collapses to "no lower bound" and
// likewise for window_end. The dashboard typically passes a 30-day window.
message GetGlobalInsightsRequest {
  RequestMeta meta = 1;
  google.protobuf.Timestamp window_start = 2;
  google.protobuf.Timestamp window_end = 3;
}

// DayBucket — one calendar day's task counts. Used by both per-project and
// fleet rollups to render stacked bars / sparklines.
message DayBucket {
  string date = 1;       // YYYY-MM-DD (local zone)
  int32 count = 2;       // succeeded + failed
  int32 succeeded = 3;
  int32 failed = 4;
}

// AgentBreakdown — one row per backend agent that touched tasks in the
// window. Field set is shared between the per-project and global rollups
// so the same renderer code works for both surfaces.
message AgentBreakdown {
  string agent = 1;
  int32 count = 2;
  double success_rate = 3;
  int64 avg_duration_ms = 4;
  int64 total_tokens_in = 5;
  int64 total_tokens_out = 6;
  double total_cost_usd = 7;
}

// TopProject — one row of the fleet rollup's top-projects pill list,
// sorted by completed-task count descending. The dashboard renders these
// as clickable pills that route to each project's InsightsTab.
message TopProject {
  string project_id = 1;
  string project_name = 2;
  string project_color = 3;
  int32 count = 4;
  double success_rate = 5;
}

// GlobalInsights is the cross-project rollup the daemon returns from
// `GetGlobalInsights`. Sums every per-project metric over the window;
// `tasks_missing_cost` surfaces a partial-data caveat when not every
// completed task carried a cost number.
message GlobalInsights {
  int32 tasks_total = 1;
  int32 tasks_succeeded = 2;
  int32 tasks_failed = 3;
  repeated DayBucket tasks_by_day = 4;
  repeated TopProject top_projects = 5;
  repeated AgentBreakdown agent_breakdown = 6;
  int64 total_duration_ms = 7;
  double total_cost_usd = 8;
  int32 tasks_missing_cost = 9;
  google.protobuf.Timestamp window_start = 10;
  google.protobuf.Timestamp window_end = 11;
}

// GetProjectInsightsRequest scopes a per-project insights query. Both
// window bounds are optional — leaving them unset queries "all time".
message GetProjectInsightsRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  google.protobuf.Timestamp window_start = 3;
  google.protobuf.Timestamp window_end = 4;
}

// ProjectInsights is the per-project rollup the daemon returns from
// `GetProjectInsights`. Same shape primitives as GlobalInsights — the
// dashboard's per-project Insights tab and the TUI per-project overlay
// reuse the same renderers.
message ProjectInsights {
  string project_id = 1;
  int32 tasks_total = 2;
  int32 tasks_succeeded = 3;
  int32 tasks_failed = 4;
  repeated DayBucket tasks_by_day = 5;
  repeated AgentBreakdown agent_breakdown = 6;
  int64 total_duration_ms = 7;
  int64 avg_duration_ms = 8;
  int64 p50_duration_ms = 9;
  int64 p95_duration_ms = 10;
  double total_cost_usd = 11;
  int32 tasks_missing_cost = 12;
  google.protobuf.Timestamp window_start = 13;
  google.protobuf.Timestamp window_end = 14;
}

// GetTaskDiffRequest names a task whose diff the daemon should compute
// against either the still-existing `watchfire/<n>` branch or, if the
// branch was already merged + deleted, the canonical merge commit on the
// project's default branch.
message GetTaskDiffRequest {
  RequestMeta meta = 1;
  string project_id = 2;
  int32 task_number = 3;
}

// FileDiffSet is the structured top-level shape returned by
// `InsightsService.GetTaskDiff`. The GUI / TUI render natively from this
// — no unified-diff parsing required. `truncated` flips when the daemon
// caps a >MaxDiffLines result.
message FileDiffSet {
  repeated FileDiff files = 1;
  int32 total_additions = 2;
  int32 total_deletions = 3;
  bool truncated = 4;
}

// FileDiff is one file-level entry inside a FileDiffSet. Binary files
// surface as `status=MODIFIED, hunks=[]` with a synthetic single hunk
// whose header reads "Binary file changed" — consumers can render a
// clear marker without trying to display bytes.
message FileDiff {
  string path = 1;
  enum Status {
    MODIFIED = 0;
    ADDED = 1;
    DELETED = 2;
    RENAMED = 3;
  }
  Status status = 2;
  string old_path = 3;
  repeated Hunk hunks = 4;
}

// Hunk corresponds to one `@@ -<oldStart>,<oldLines> +<newStart>,<newLines> @@`
// region of a unified diff. `header` carries the trailing context label
// git emits after the second `@@` (the function name, when available).
message Hunk {
  int32 old_start = 1;
  int32 old_lines = 2;
  int32 new_start = 3;
  int32 new_lines = 4;
  string header = 5;
  repeated DiffLine lines = 6;
}

// DiffLine is one line inside a Hunk. `text` excludes the leading +/-/space
// prefix; the kind tag carries that semantic.
message DiffLine {
  enum Kind {
    CONTEXT = 0;
    ADD = 1;
    DEL = 2;
  }
  Kind kind = 1;
  string text = 2;
}

// InsightsService handles cross-task analytics. v6.0 Ember scope is per-task
// / per-project / fleet rollups in CSV + Markdown plus the dashboard
// rollup, plus the per-task structured diff for the inline diff viewer.
// Future v6.x can extend with PDF / HTML / scheduled export without
// breaking the wire.
service InsightsService {
  rpc ExportReport(ExportReportRequest) returns (ExportReportResponse);
  rpc GetGlobalInsights(GetGlobalInsightsRequest) returns (GlobalInsights);
  rpc GetProjectInsights(GetProjectInsightsRequest) returns (ProjectInsights);
  rpc GetTaskDiff(GetTaskDiffRequest) returns (FileDiffSet);
}

// ============================================================================
// Integrations Messages (v7.0 Relay)
// ============================================================================

// IntegrationKind disambiguates the four outbound integration types in
// the IntegrationsService oneof payloads. The on-the-wire ordering
// matches the order the GUI surfaces them in the picker.
enum IntegrationKind {
  WEBHOOK = 0;
  SLACK = 1;
  DISCORD = 2;
  GITHUB = 3;
}

// IntegrationEvents is the per-integration event-bitmask. Mirrors the
// daemon-side `models.EventBitmask` shape. Each integration carries its
// own copy so the user can fan TASK_FAILED to Slack but RUN_COMPLETE to
// Discord without duplicating endpoints.
message IntegrationEvents {
  bool task_failed = 1;
  bool run_complete = 2;
  bool weekly_digest = 3;
}

// WebhookIntegration is a single generic outbound webhook target. The
// `secret` field is write-only — Save accepts it (and pushes it to the
// keyring); List + the response of Save scrub it (returning only
// `secret_set: bool`).
message WebhookIntegration {
  string id = 1;
  string label = 2;
  string url = 3;
  string url_label = 4;                // Masked, display-only ("***hooks.example.com/...")
  bool secret_set = 5;                 // True if the keyring carries a secret
  string secret = 6;                   // Write-only — never returned by List
  IntegrationEvents enabled_events = 7;
  repeated string project_mute_ids = 8;
}

// SlackIntegration targets a Slack incoming webhook. The URL itself is
// the secret (Slack's incoming-webhook auth model), so it is write-only
// — Save accepts it; List returns only the masked `url_label`.
message SlackIntegration {
  string id = 1;
  string label = 2;
  string url = 3;                      // Write-only — never returned by List
  string url_label = 4;                // Masked, display-only
  bool url_set = 5;                    // True if the keyring carries the URL
  IntegrationEvents enabled_events = 6;
  repeated string project_mute_ids = 7;
}

// DiscordIntegration mirrors SlackIntegration exactly — Discord's
// webhook auth model is the same (URL-as-secret).
message DiscordIntegration {
  string id = 1;
  string label = 2;
  string url = 3;                      // Write-only — never returned by List
  string url_label = 4;                // Masked, display-only
  bool url_set = 5;                    // True if the keyring carries the URL
  IntegrationEvents enabled_events = 6;
  repeated string project_mute_ids = 7;
}

// GitHubIntegration is the single-instance GitHub auto-PR config. No
// URL field — relies on `gh` CLI auth.
message GitHubIntegration {
  bool enabled = 1;
  bool draft_default = 2;
  repeated string project_scopes = 3;
}

// IntegrationsConfig is the root document the IntegrationsService
// returns from List + as the response to Save / Delete.
message IntegrationsConfig {
  repeated WebhookIntegration webhooks = 1;
  repeated SlackIntegration slack = 2;
  repeated DiscordIntegration discord = 3;
  GitHubIntegration github = 4;
}

message ListIntegrationsRequest {
  RequestMeta meta = 1;
}

// SaveIntegrationRequest is the unified create + update wire shape. The
// `payload` oneof carries the integration-specific body; the server
// derives create-vs-update by checking whether the ID already exists in
// the YAML.
message SaveIntegrationRequest {
  RequestMeta meta = 1;
  oneof payload {
    WebhookIntegration webhook = 2;
    SlackIntegration slack = 3;
    DiscordIntegration discord = 4;
    GitHubIntegration github = 5;
  }
}

// DeleteIntegrationRequest names the integration to delete by kind + id.
// GitHub is single-instance; passing GITHUB resets it to the zero value.
message DeleteIntegrationRequest {
  RequestMeta meta = 1;
  IntegrationKind kind = 2;
  string id = 3;                       // Ignored when kind = GITHUB
}

// TestIntegrationRequest fires a synthetic notification through the
// dispatcher to the named integration. Used by the GUI / TUI's "Test"
// button to verify plumbing end-to-end.
message TestIntegrationRequest {
  RequestMeta meta = 1;
  IntegrationKind kind = 2;
  string id = 3;
}

message TestIntegrationResponse {
  bool ok = 1;
  string message = 2;                  // Human-readable success / failure summary
  int32 status_code = 3;               // HTTP status of the test send (0 if not applicable)
}

// IntegrationsService handles both outbound (v7.0 Relay) and inbound
// (v8.0 Echo) integrations configuration. Each outbound Save / Delete
// triggers the dispatcher's adapter-list rebuild via the
// `EventIntegrationsChanged` watcher event. Inbound config changes are
// applied by the daemon at next Echo-server restart (the SaveInboundConfig
// RPC tears down + rebinds the listener so new addresses / disabled
// toggles take effect immediately).
service IntegrationsService {
  rpc ListIntegrations(ListIntegrationsRequest) returns (IntegrationsConfig);
  rpc SaveIntegration(SaveIntegrationRequest) returns (IntegrationsConfig);
  rpc DeleteIntegration(DeleteIntegrationRequest) returns (IntegrationsConfig);
  rpc TestIntegration(TestIntegrationRequest) returns (TestIntegrationResponse);

  // v8.0 Echo: inbound HTTP listener configuration + status.
  rpc GetInboundStatus(GetInboundStatusRequest) returns (InboundStatus);
  rpc SaveInboundConfig(SaveInboundConfigRequest) returns (InboundStatus);
}

// InboundConfig (v8.0 Echo) — wire shape of `models.InboundConfig`.
// Per-provider secret fields are write-only: Save accepts them (and
// pushes them to the keyring); List / Save responses scrub them and
// return only the `*_set: bool` companion. Empty secret on update means
// "leave the existing keyring entry alone" — matches the Slack / Discord
// URL upsert convention from v7.0 Relay.
message InboundConfig {
  string listen_addr = 1;             // e.g. "127.0.0.1:8765"; empty = use default
  string public_url = 2;              // optional — user-supplied tunnel URL (https://*)
  bool github_secret_set = 3;
  string github_secret = 4;           // write-only; never returned
  bool slack_secret_set = 5;
  string slack_secret = 6;            // write-only; never returned
  bool discord_public_key_set = 7;
  string discord_public_key = 8;      // write-only; never returned
  string discord_app_id = 9;          // non-secret — surfaced as plain field
  bool discord_bot_token_set = 10;
  string discord_bot_token = 11;      // write-only; never returned
  bool disabled = 12;                 // master toggle (true = no listener)
  int32 rate_limit_per_min = 13;      // v8.x — per-IP token bucket; 0 = use default (30/min); negative = disable
}

// InboundStatus (v8.0 Echo) is the response of GetInboundStatus and
// SaveInboundConfig. The `config` field carries the scrubbed config for
// rendering; `last_*_delivery_unix` is 0 when no delivery has ever been
// recorded (per-process counter, not persisted across restarts).
message InboundStatus {
  bool listening = 1;                 // true if the HTTP server is currently bound
  string listen_addr = 2;             // resolved bind address (with default applied)
  string public_url = 3;              // mirrors config.public_url
  string bind_error = 4;              // empty on success; populated when bind failed
  int64 last_github_delivery_unix = 5;
  int64 last_slack_delivery_unix = 6;
  int64 last_discord_delivery_unix = 7;
  string version = 8;                 // build version (e.g. "8.0.0")
  InboundConfig config = 9;           // scrubbed (no plaintext secrets returned)

  // v8.x Echo — per-guild Discord slash-command registration status.
  // Populated by the daemon's auto-registrar; empty when the bot token
  // is not configured. The Settings UI lists each guild + ✓/✗ pill.
  repeated DiscordGuildRegistration discord_guilds = 10;
}

message GetInboundStatusRequest {
  RequestMeta meta = 1;
}

message SaveInboundConfigRequest {
  RequestMeta meta = 1;
  InboundConfig config = 2;
}

// DiscordGuildRegistration (v8.x Echo) is a single guild's auto-register
// outcome. `registered` reflects the most recent attempt; `error` is empty
// on success and carries the per-command failure message otherwise.
// `registered_at_unix` is when the daemon last completed (or failed) a
// register attempt against this guild.
message DiscordGuildRegistration {
  string guild_id = 1;
  string guild_name = 2;
  bool registered = 3;
  string error = 4;
  int64 registered_at_unix = 5;
}

appId: io.watchfire.app
productName: Watchfire
directories:
  buildResources: resources
  output: dist
npmRebuild: true
files:
  - out/**/*
mac:
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: "entitlements.mac.plist"
  entitlementsInherit: "entitlements.mac.plist"
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]
  notarize: true
  extraResources:
    - from: "../build/watchfired-${arch}"
      to: "watchfired"
    - from: "../build/watchfire-${arch}"
      to: "watchfire"
dmg:
  sign: true
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  icon: resources/icon.png
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  desktop:
    Name: Watchfire
    Comment: Remote control for AI coding agents
    Categories: Development;IDE;
  extraResources:
    - from: "../build/watchfired-x64"
      to: "watchfired"
    - from: "../build/watchfire-x64"
      to: "watchfire"
win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch: [x64]
  artifactName: "Watchfire-Setup-${version}.${ext}"
  extraResources:
    - from: "../build/watchfired-x64.exe"
      to: "watchfired.exe"
    - from: "../build/watchfire-x64.exe"
      to: "watchfire.exe"
nsis:
  oneClick: false
  perMachine: false
  allowToDir: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Watchfire
publish:
  provider: github
  owner: watchfire-io
  repo: watchfire
  releaseType: release
